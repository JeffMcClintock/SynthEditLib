<body>
<h2>Low Pass (6dB)</h2>
<p>A simple, efficient low-pass filter with a gentle 6 dB/octave response. Technically a first-order ('one pole', leaky-integrator) low-pass.</p>
<h2>Pins</h2>
<ul>
	<li><b>Signal</b> - the audio input to be filtered.</li>
	<li><b>Pitch</b> - the cutoff frequency (1 Volt/Octave).</li>
	<li><b>Output</b> - the filtered audio.</li>
</ul>
</body>
